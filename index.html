function closeAnnPopup() {
  const p = document.getElementById('ann-popup');
  if (!p) return;
  p.style.opacity = '0';
  p.style.pointerEvents = 'none';
  setTimeout(function() { p.style.display = 'none'; }, 600);
}

function showAnnouncementPopup() {
  const ann = state.announcement;
  if (!ann || !ann.active || !ann.text) return;
  const expired = ann.expires_at && new Date(ann.expires_at) < new Date();
  if (expired) return;
  const popup = document.getElementById('ann-popup');
  const textEl = document.getElementById('ann-text');
  if (!popup || !textEl) return;
  textEl.textContent = ann.text;
  popup.style.opacity = '0';
  popup.style.pointerEvents = 'none';
  popup.style.display = 'flex';
  setTimeout(function() { popup.style.opacity = '1'; popup.style.pointerEvents = 'auto'; }, 50);
  const secs = (ann.seconds||4)*1000;
  setTimeout(function() {
    popup.style.opacity = '0';
    setTimeout(function() { popup.style.display = 'none'; }, 600);
  }, secs);
}

async function saveAnnouncement(text, duration, seconds) {
  seconds = seconds||4;
  const now = Date.now();
  const expires = duration==='permanent' ? null :
    duration==='12h' ? new Date(now+12*3600000).toISOString() :
    duration==='24h' ? new Date(now+24*3600000).toISOString() :
    new Date(now+48*3600000).toISOString();
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/announcements?id=eq.1`, {
      method:'PATCH',
      headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY},
      body:JSON.stringify({text,duration,seconds:seconds,expires_at:expires,active:true})
    });
  } catch(e) {}
}

function generateSlots() {
  const slots = [];
  let total = WORKING_HOURS.start * 60;
  const end = WORKING_HOURS.end * 60;
  while (total < end) {
    const h = Math.floor(total / 60);
    const m = total % 60;
    slots.push(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);
    total += SLOT_DURATION;
  }
  return slots;
}

const _audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playClick() {
  try {
    const osc = _audioCtx.createOscillator();
    const gain = _audioCtx.createGain();
    osc.connect(gain);
    gain.connect(_audioCtx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(1200, _audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(800, _audioCtx.currentTime + 0.03);
    gain.gain.setValueAtTime(0.1, _audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, _audioCtx.currentTime + 0.03);
    osc.start(_audioCtx.currentTime);
    osc.stop(_audioCtx.currentTime + 0.03);
  } catch(e) {}
}

function getMonthDates(monthOffset) {
  const today = new Date(); today.setHours(0,0,0,0);
  const base = new Date(today.getFullYear(), today.getMonth() + monthOffset, 1);
  const year = base.getFullYear(); const month = base.getMonth();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  return { year, month, daysInMonth,
    monthName: ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'][month] };
}

// מחזיר 7 ימים החל מיום ראשון של השבוע
function getDates(weekOffset) {
  const today = new Date(); today.setHours(0,0,0,0);
  // מצא את יום ראשון של השבוע הנוכחי
  const dayOfWeek = today.getDay(); // 0=ראשון
  const sunday = new Date(today);
  sunday.setDate(today.getDate() - dayOfWeek + weekOffset * 7);
  return Array.from({length:7}, (_,i) => { const d=new Date(sunday); d.setDate(sunday.getDate()+i); return d; });
}

  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

      <button data-action="owner-tab" data-tab="customers" style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:16px 8px;min-height:90px;width:100%;background:${tab==='customers' ? 'rgba(201,168,76,0.13)' : 'rgba(255,255,255,0.04)'};border:${tab==='customers' ? '1.5px solid #c9a84c' : '1px solid rgba(255,255,255,0.25)'};border-radius:16px;cursor:pointer;"><div style="pointer-events:none;"><svg width="30" height="30" viewBox="0 0 24 24" fill="none"><circle cx="9" cy="8" r="3.5" stroke="#c9a84c" stroke-width="1.6" fill="none"/><path d="M3 20c0-4 2.7-6 6-6s6 2 6 6" stroke="#c9a84c" stroke-width="1.6" stroke-linecap="round" fill="none"/><circle cx="17" cy="9" r="2.5" stroke="#c9a84c" stroke-width="1.4" fill="none" opacity="0.7"/><path d="M20 20c0-3-1.5-4.5-3.5-5" stroke="#c9a84c" stroke-width="1.4" stroke-linecap="round" opacity="0.7"/></svg></div><div style="font-size:11px;font-weight:600;text-align:center;line-height:1.35;color:${tab==='customers' ? '#c9a84c' : 'rgba(255,255,255,0.45)'};pointer-events:none;">לקוחות</div></button>

  ${state.showAnnModal ? `

      <div style="background:#1a1a1a;border:1px solid rgba(201,168,76,0.6);border-radius:18px;padding:22px;width:100%;max-width:360px;" data-action="modal-inner">

        <textarea id="ann-input" placeholder="כתוב הודעה שתופיע ללקוחות בכניסה..." style="width:100%;height:90px;background:rgba(255,255,255,0.07);border:0.5px solid rgba(255,255,255,0.18);border-radius:10px;padding:10px;color:#fff;font-size:14px;resize:none;outline:none;font-family:inherit;margin-bottom:12px;">${(()=>{const a=state.announcement;const exp=a&&a.expires_at&&new Date(a.expires_at)<new Date();return (a&&a.active&&a.text&&!exp)?a.text:'';})()}</textarea>

function renderOwnerCalendar() {
  const view = state.calendarView || 'week';
  const today = formatDate(new Date());

  // ── toggle bar ──
  const toggleBtn = (v, label) => `<button data-action="cal-view" data-view="${v}" style="flex:1;padding:7px 4px;border-radius:8px;border:${view===v?'1px solid rgba(201,168,76,0.6)':'0.5px solid rgba(255,255,255,0.1)'};background:${view===v?'rgba(201,168,76,0.18)':'rgba(255,255,255,0.04)'};color:${view===v?'#c9a84c':'rgba(255,255,255,0.45)'};font-size:13px;font-weight:${view===v?'600':'400'};cursor:pointer;">${label}</button>`;
  const toggle = `<div style="display:flex;gap:6px;margin-bottom:14px;">${toggleBtn('day','יומי')}${toggleBtn('week','שבועי')}${toggleBtn('month','חודשי')}</div>`;

  // ── DAY VIEW ──
  if (view === 'day') {
    const base = new Date(); base.setHours(0,0,0,0);
    base.setDate(base.getDate() + (state.calendarDayOffset||0));
    const ds = formatDate(base);
    const fd = formatDisplayDate(base);
    const isToday = ds === today;
    return toggle + `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
      <button data-action="cal-day-prev" style="background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.1);color:#fff;width:36px;height:36px;border-radius:10px;cursor:pointer;font-size:20px;">‹</button>
      <div style="text-align:center;">
        <div style="font-size:15px;font-weight:600;color:${isToday?'#c9a84c':'#fff'};">יום ${fd.day}', ${fd.date} ${fd.month}</div>
        ${isToday?`<div style="font-size:11px;color:rgba(201,168,76,0.6);margin-top:2px;">היום</div>`:''}
      </div>
      <button data-action="cal-day-next" style="background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.1);color:#fff;width:36px;height:36px;border-radius:10px;cursor:pointer;font-size:20px;">›</button>
    </div>
    ${renderOwnerDaySlots(ds)}`;
  }

  // ── MONTH VIEW ──
  if (view === 'month') {
    const { year, month, daysInMonth, monthName } = getMonthDates(state.calendarMonthOffset||0);
    const firstDay = new Date(year, month, 1).getDay();
    const dayLabels = ['א','ב','ג','ד','ה','ו','ש'];
    let cells = [];
    for (let i=0;i<firstDay;i++) cells.push(`<div></div>`);
    for (let d=1;d<=daysInMonth;d++) {
      const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const dayAppts = state.appointments.filter(a=>a.date===ds);
      const pending = dayAppts.filter(a=>a.status==='pending').length;
      const approved = dayAppts.filter(a=>a.status==='approved').length;
      const isToday = ds===today; const sel = state.selectedDate===ds;
      cells.push(`<button data-action="select-date" data-date="${ds}" style="padding:6px 2px;border-radius:9px;border:${sel?'2px solid #c9a84c':isToday?'1.5px solid rgba(201,168,76,0.5)':'1px solid rgba(255,255,255,0.28)'};background:${sel?'rgba(201,168,76,0.18)':isToday?'rgba(255,255,255,0.07)':'rgba(255,255,255,0.02)'};color:${sel?'#c9a84c':isToday?'#fff':'rgba(255,255,255,0.55)'};cursor:pointer;text-align:center;min-height:52px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;">
        <div style="font-size:14px;font-weight:${isToday?'700':'400'};">${d}</div>
        <div style="display:flex;gap:2px;justify-content:center;">
          ${approved>0?`<div style="width:5px;height:5px;background:#4caf50;border-radius:50%;"></div>`:''}
          ${pending>0?`<div style="width:5px;height:5px;background:#ff9800;border-radius:50%;"></div>`:''}
        </div>
      </button>`);
    }
    return toggle + `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
      <button data-action="cal-month-prev" style="background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.1);color:#fff;width:36px;height:36px;border-radius:10px;cursor:pointer;font-size:20px;">‹</button>
      <span style="color:rgba(255,255,255,0.7);font-size:15px;font-weight:600;">${monthName} ${year}</span>
      <button data-action="cal-month-next" style="background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.1);color:#fff;width:36px;height:36px;border-radius:10px;cursor:pointer;font-size:20px;">›</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:6px;">
      ${dayLabels.map(d=>`<div style="text-align:center;font-size:11px;color:rgba(255,255,255,0.25);padding:4px 0;">${d}</div>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:14px;">${cells.join('')}</div>
    <div style="font-size:11px;color:rgba(255,255,255,0.2);margin-bottom:8px;display:flex;gap:10px;">
      <span><span style="display:inline-block;width:7px;height:7px;background:#4caf50;border-radius:50%;margin-left:3px;"></span>אושר</span>
      <span><span style="display:inline-block;width:7px;height:7px;background:#ff9800;border-radius:50%;margin-left:3px;"></span>ממתין</span>
    </div>
    ${state.selectedDate ? renderOwnerDaySlots(state.selectedDate) : `<div style="text-align:center;color:rgba(255,255,255,0.6);padding:2rem;font-size:14px;">לחץ על יום לצפייה בתורים</div>`}`;
  }

  // ── WEEK VIEW (default) ──
  const dates = getDates(state.calendarWeekOffset);
  return toggle + `
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">
    <button data-action="week-prev" style="background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.1);color:#fff;width:36px;height:36px;border-radius:10px;cursor:pointer;font-size:19.8px;">‹</button>
    <span style="color:rgba(255,255,255,0.55);font-size:14.3px;">${formatDisplayDate(dates[0]).date} ${formatDisplayDate(dates[0]).month} – ${formatDisplayDate(dates[6]).date} ${formatDisplayDate(dates[6]).month}</span>
    <button data-action="week-next" style="background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.1);color:#fff;width:36px;height:36px;border-radius:10px;cursor:pointer;font-size:19.8px;">›</button>
  </div>
  <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:1rem;">
    ${dates.map(d => {
      const ds=formatDate(d); const fd=formatDisplayDate(d);
      const appts=state.appointments.filter(a=>a.date===ds);
      const isToday=ds===today; const sel=state.selectedDate===ds;
      return `<button data-action="select-date" data-date="${ds}" style="padding:10px 4px;border-radius:10px;border:${sel?'2px solid #c9a84c':'1px solid rgba(255,255,255,0.3)'};background:${sel?'rgba(201,168,76,0.15)':isToday?'rgba(255,255,255,0.07)':'transparent'};color:${sel?'#c9a84c':isToday?'#fff':'rgba(255,255,255,0.5)'};cursor:pointer;text-align:center;min-height:64px;">
        <div style="font-size:11px;color:${sel?'rgba(201,168,76,0.7)':'rgba(255,255,255,0.3)'};margin-bottom:2px;">${fd.day}'</div>
        <div style="font-size:17.6px;font-weight:${isToday?'600':'400'};">${fd.date}</div>
        ${appts.length>0?`<div style="width:6px;height:6px;background:#c9a84c;border-radius:50%;margin:3px auto 0;"></div>`:'<div style="height:9px;"></div>'}
      </button>`;
    }).join('')}
  </div>
  ${state.selectedDate ? renderOwnerDaySlots(state.selectedDate) : `<div style="text-align:center;color:rgba(255,255,255,0.2);padding:3rem;font-size:15.4px;">בחר יום לצפייה בתורים</div>`}`;
}

function renderOwnerDaySlots(dateStr) {
  const slots = generateSlots();
  const fd = formatDisplayDate(new Date(dateStr+'T12:00:00'));
  return `
  <div>
    <div style="font-size:14.3px;color:rgba(255,255,255,0.45);margin-bottom:12px;text-align:center;">יום ${fd.day}', ${fd.date} ${fd.month}</div>
    ${slots.map(time => {
      const appt=isSlotBooked(dateStr,time); const past=isPastSlot(dateStr,time);
      const svc=appt?SERVICES.find(s=>s.id===appt.service):null;
      return `<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;margin-bottom:6px;border-radius:12px;background:${appt?'rgba(201,168,76,0.08)':'rgba(255,255,255,0.03)'};border:1px solid ${appt?'rgba(201,168,76,0.55)':'rgba(255,255,255,0.28)'};">
        <span style="font-size:15.4px;font-weight:500;color:${appt?'#ccc':'rgba(255,255,255,0.3)'};min-width:44px;">${time}</span>
        ${appt?`
          <div style="flex:1;">
            <div style="font-size:15.4px;color:#fff;font-weight:500;">${appt.customer_name}</div>
            <div style="font-size:13.2px;color:rgba(255,255,255,0.4);margin-top:1px;">${phoneLink(appt.customer_phone)}</div>
            ${svc?`<div style="font-size:12.1px;color:rgba(201,168,76,0.7);margin-top:1px;">✂️ ${svc.name} — ₪${svc.price}</div>`:''}
          </div>
          <button data-action="owner-reschedule" data-id="${appt.id}" style="background:rgba(255,255,255,0.07);border:0.5px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.7);padding:5px 10px;border-radius:8px;font-size:12.1px;cursor:pointer;pointer-events:all;">שנה</button>
          ${appt.status==='pending'?`<button data-action="noop" onclick="ownerApproveModal('${appt.id}');return false;" style="background:rgba(76,175,80,0.15);border:1px solid rgba(76,175,80,0.5);color:#4caf50;padding:5px 10px;border-radius:8px;font-size:12.1px;cursor:pointer;pointer-events:all;font-weight:600;">✓ אשר</button>`:''}
          <button data-action="noop" onclick="ownerCancelModal('${appt.id}');return false;" style="background:rgba(220,50,50,0.12);border:0.5px solid rgba(220,50,50,0.3);color:#ff8080;padding:5px 10px;border-radius:8px;font-size:12.1px;cursor:pointer;pointer-events:all;">בטל</button>
        `:`<span style="font-size:14.3px;color:rgba(255,255,255,0.18);">${past?'עבר':'פנוי'}</span>`}
      </div>`;
    }).join('')}
  </div>`;
}

function renderOwnerAvailability() {
  const today = formatDate(new Date());
  const { year, month, daysInMonth, monthName } = getMonthDates(state.availMonthOffset);
  const days = ['א','ב','ג','ד','ה','ו','ש']; // א=ראשון
  const firstDay = new Date(year, month, 1).getDay();
  let cells = [];
  for (let i=0; i<firstDay; i++) cells.push(null);
  for (let d=1; d<=daysInMonth; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);

  const selDate = state.availSelectedDate;
  const slots = generateSlots();

function formatLogDetails(details) {
  if (!details) return '';
  // זיהוי מספרי טלפון והפיכתם ללינק וואצאפ
  return details.replace(/(0\d{1,2}[-\s]?\d{7,8}|\d{10})/g, (phone) => {
    const clean = phone.replace(/\D/g,'');
    const intl = '972' + clean.replace(/^0/,'');
    const formatted = clean.length >= 3 ? clean.slice(0,3)+'-'+clean.slice(3) : clean;
    return `<a href="https://wa.me/${intl}" target="_blank" style="color:#25D366;font-weight:700;font-size:15px;background:rgba(37,211,102,0.12);padding:2px 8px;border-radius:6px;border:0.5px solid rgba(37,211,102,0.3);text-decoration:none;">📞 ${formatted}</a>`;
  });
}

function renderOwnerList() {
  const today = formatDate(new Date());
  let allUpcoming = state.appointments.filter(a=>a.date>=today);

  // סינון לפי כפתור סטטיסטיקה
  let filtered = allUpcoming;
  let filterLabel = '';
  if (state.listFilter==='today') { filtered = allUpcoming.filter(a=>a.date===today); filterLabel='📅 תורים היום'; }
  else if (state.listFilter==='upcoming') { filtered = allUpcoming.filter(a=>a.status==='approved'); filterLabel='✓ תורים קבועים'; }
  else if (state.listFilter==='pending') { filtered = allUpcoming.filter(a=>a.status==='pending'); filterLabel='⏳ ממתינים לאישור'; }

  const upcoming = filtered.sort((a,b)=>{
    if(a.status==='pending'&&b.status!=='pending') return -1;
    if(a.status!=='pending'&&b.status==='pending') return 1;
    return (a.date+a.time).localeCompare(b.date+b.time);
  });
  const filterBar = filterLabel ? `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;"><div style="font-size:13.2px;color:#ccc;font-weight:500;">${filterLabel}</div><button data-action="stat-click" data-filter="${state.listFilter}" style="background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.5);padding:3px 10px;border-radius:7px;font-size:12.1px;cursor:pointer;">✕ נקה</button></div>` : '';
  if (!upcoming.length) return filterBar+`<div style="text-align:center;color:rgba(255,255,255,0.2);padding:3rem;font-size:15.4px;">אין תורים</div>`;
  const pending = upcoming.filter(a=>a.status==='pending');
  const others = upcoming.filter(a=>a.status!=='pending');
  const renderAppt = (a) => {
    const fd=formatDisplayDate(new Date(a.date+'T12:00:00'));
    const svc=SERVICES.find(s=>s.id===a.service);
    const isPending=a.status==='pending';

function renderOwnerStats() {
  const period = state.statsPeriod || 'all';
  const now = new Date();

  function cutoffDate(p) {
    if (p === 'all') return null;
    const d = new Date(now);
    if (p === 'week')  d.setDate(d.getDate() - 7);
    if (p === 'month') d.setDate(d.getDate() - 30);
    if (p === '60')    d.setDate(d.getDate() - 60);
    return formatDate(d);
  }
  const cutoff = cutoffDate(period);

  const appts = cutoff ? state.appointments.filter(a => a.date >= cutoff) : state.appointments;
  const logs  = cutoff ? state.logs.filter(l => {
    if (!l.created_at) return true;
    return l.created_at.slice(0,10) >= cutoff;
  }) : state.logs;

  // 1. שירות מבוקש ביותר
  const svcCount = {};
  appts.forEach(a => { if (a.service) svcCount[a.service] = (svcCount[a.service]||0)+1; });
  const topSvcId  = Object.entries(svcCount).sort((a,b)=>b[1]-a[1])[0];
  const topSvc    = topSvcId ? SERVICES.find(s=>s.id===topSvcId[0]) : null;
  const topSvcStr = topSvc ? `${topSvc.name} (${topSvcId[1]} תורים)` : '—';

  // 2. לקוח שקבע הכי הרבה
  const bookCount = {};
  appts.forEach(a => { const k=a.customer_name||a.username; if(k) bookCount[k]=(bookCount[k]||0)+1; });
  const topBook = Object.entries(bookCount).sort((a,b)=>b[1]-a[1])[0];
  const topBookStr = topBook ? `${topBook[0]} (${topBook[1]} תורים)` : '—';

  // 3. לקוח שביטל הכי הרבה
  const cancelCount = {};
  logs.filter(l=>l.action&&l.action.includes('ביטול')).forEach(l => {
    const k=l.username; if(k) cancelCount[k]=(cancelCount[k]||0)+1;
  });
  const topCancel = Object.entries(cancelCount).sort((a,b)=>b[1]-a[1])[0];
  const topCancelStr = topCancel ? `${topCancel[0]} (${topCancel[1]} ביטולים)` : '—';

  // 4. לקוח שהזיז תור הכי הרבה
  const reschedCount = {};
  logs.filter(l=>l.action&&l.action.includes('שינוי מועד')).forEach(l => {
    const k=l.username; if(k) reschedCount[k]=(reschedCount[k]||0)+1;
  });
  const topResched = Object.entries(reschedCount).sort((a,b)=>b[1]-a[1])[0];
  const topReschedStr = topResched ? `${topResched[0]} (${topResched[1]} העברות)` : '—';

  // 5. לקוח ששילם הכי הרבה
  const paidMap = {};
  appts.filter(a=>a.status==='approved').forEach(a => {
    const svc = SERVICES.find(s=>s.id===a.service);
    const k = a.customer_name||a.username;
    if(k && svc) paidMap[k] = (paidMap[k]||0) + svc.price;
  });
  const topPaid = Object.entries(paidMap).sort((a,b)=>b[1]-a[1])[0];
  const topPaidStr = topPaid ? `${topPaid[0]} (₪${topPaid[1]})` : '—';

  const card = (icon, title, value, color) => `
    <div style="background:rgba(255,255,255,0.04);border:0.5px solid rgba(255,255,255,0.08);border-radius:14px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:14px;">
      <div style="font-size:28px;flex-shrink:0;">${icon}</div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:12px;color:rgba(255,255,255,0.35);margin-bottom:4px;">${title}</div>
        <div style="font-size:15px;font-weight:600;color:${color};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${value}</div>
      </div>
    </div>`;

  const periodLabels = { week:'7 ימים אחרונים', month:'30 ימים אחרונים', '60':'60 ימים אחרונים', all:'כל הזמנים' };
  const periods = ['week','month','60','all'];

  const noData = !appts.length && !logs.length;

  return `
    <div style="display:flex;gap:6px;margin-bottom:16px;">
      ${periods.map(p=>`<button data-action="noop" data-stats-period="${p}" style="flex:1;padding:7px 4px;border-radius:10px;border:0.5px solid ${period===p?'rgba(201,168,76,0.6)':'rgba(255,255,255,0.1)'};background:${period===p?'rgba(201,168,76,0.15)':'transparent'};color:${period===p?'#c9a84c':'rgba(255,255,255,0.45)'};font-size:11.5px;font-weight:${period===p?'600':'400'};cursor:pointer;">${periodLabels[p]}</button>`).join('')}
    </div>
    <div style="margin-bottom:14px;font-size:13px;color:rgba(255,255,255,0.3);">סיכום פעילות — ${periodLabels[period]}</div>
    ${noData ? `<div style="text-align:center;color:rgba(255,255,255,0.2);padding:3rem;font-size:15px;"><div style="font-size:36px;margin-bottom:8px;">📊</div><div>אין מספיק נתונים עדיין</div></div>` : `
    ${card('✂️', 'שירות מבוקש ביותר', topSvcStr, '#c9a84c')}
    ${card('📅', 'קבע הכי הרבה תורים', topBookStr, '#4caf50')}
    ${card('❌', 'ביטל הכי הרבה תורים', topCancelStr, '#f44336')}
    ${card('🔄', 'הזיז תור הכי הרבה', topReschedStr, '#2196f3')}
    ${card('💰', 'שילם הכי הרבה', topPaidStr, '#c9a84c')}
    `}
  `;
}

function renderOwnerAnnouncement() {

  return '<div>'

    +'<textarea id="ann-input" placeholder="כתוב הודעה ללקוחות..." style="width:100%;height:100px;background:rgba(255,255,255,0.07);border:0.5px solid rgba(255,255,255,0.18);border-radius:12px;padding:12px;color:#fff;font-size:15px;resize:none;outline:none;font-family:inherit;">'+currentText+'</textarea>'
    +'<div style="margin-top:12px;margin-bottom:16px;">'
    +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;"><label style="font-size:13px;color:rgba(255,255,255,0.5);">שניות הצגה:</label><input id="ann-seconds" type="range" min="2" max="10" step="1" value="'+((ann&&ann.seconds)||4)+'" style="flex:1;accent-color:#c9a84c;" oninput="document.getElementById(\"ann-sec-val\").textContent=this.value"><span id="ann-sec-val" style="color:#c9a84c;font-weight:600;min-width:20px;">'+((ann&&ann.seconds)||4)+'</span> שנ.</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">'+durBtns+'</div>'
    +'</div>'
    +'<button data-action="ann-save" style="width:100%;padding:13px;background:rgba(201,168,76,0.15);border:0.5px solid rgba(201,168,76,0.4);border-radius:12px;color:#c9a84c;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:10px;">💾 שמור הודעה</button>'
    +clearBtn+successDiv+'</div>';
}

function renderMonthCalendar() {
  const today = formatDate(new Date());
  const { year, month, daysInMonth, monthName } = getMonthDates(state.calendarWeekOffset);
  const days = ['א','ב','ג','ד','ה','ו','ש']; // א=ראשון
  // יום ראשון של החודש (0=ראשון)
  const firstDay = new Date(year, month, 1).getDay();
  // בונה גריד: ריקים לפני, אחר-כך ימים
  let cells = [];
  for (let i=0; i<firstDay; i++) cells.push(null);
  for (let d=1; d<=daysInMonth; d++) cells.push(d);
  // משלים לשורה שלמה
  while (cells.length % 7 !== 0) cells.push(null);

  return `
  <div style="background:rgba(206,177,145,0.18);border-radius:14px;border:0.5px solid rgba(206,177,145,0.1);padding:12px;margin-bottom:12px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
      <button data-action="cust-month-prev" style="background:rgba(206,177,145,0.08);border:0.5px solid rgba(206,177,145,0.15);color:#5C3D1E;font-weight:700;width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:19.8px;line-height:1;">‹</button>
      <span style="font-size:15.4px;font-weight:600;color:#5C3D1E;">${monthName} ${year}</span>
      <button data-action="cust-month-next" style="background:rgba(206,177,145,0.08);border:0.5px solid rgba(206,177,145,0.15);color:#5C3D1E;font-weight:700;width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:19.8px;line-height:1;">›</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px;">
      ${days.map(d=>`<div style="text-align:center;font-size:11px;color:#7A5533;padding:2px 0;">${d}'</div>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;">
      ${cells.map(d=>{
        if (!d) return `<div></div>`;
        const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const isPast = ds < today;
        const isToday = ds === today;
        const sel = state.selectedDate === ds;
        const freeCount = isPast ? 0 : state.availability.filter(a=>a.date===ds&&!isSlotBooked(ds,a.time)&&!isPastSlot(ds,a.time)).length;
        return `<button data-action="${isPast?'':'cust-select-date'}" data-date="${ds}" style="padding:6px 2px;border-radius:8px;border:${sel?'2px solid #8B6040':isToday?'1.5px solid #A08060':'0.5px solid transparent'};background:${sel?'rgba(139,96,64,0.2)':isToday?'rgba(139,96,64,0.1)':'transparent'};color:${sel?'#5C3D1E':isPast?'rgba(150,120,80,0.35)':'#3A2010'};cursor:${isPast?'default':'pointer'};text-align:center;min-height:42px;position:relative;">
          <div style="font-size:15.4px;font-weight:${isToday?'700':'400'};pointer-events:none;">${d}</div>
          ${!isPast&&freeCount>0?`<div style="width:5px;height:5px;border-radius:50%;background:${sel?'#c9a84c':'#4caf50'};margin:2px auto 0;pointer-events:none;"></div>`:`<div style="height:7px;pointer-events:none;"></div>`}
        </button>`;
      }).join('')}
    </div>
  </div>`;
}

async function handleAction(e) {
  const action = e.currentTarget.dataset.action;
  state.error=''; state.success='';

  if (action==='guest-view') {
    state.user={name:'אורח',username:'guest',phone:'',role:'guest'};
    state.view='customer'; state.selectedService=null; state.selectedDate=null;
    render();
    Promise.all([getAppointments().catch(()=>[]), getAvailability().catch(()=>[])]).then(([a,v])=>{
      state.appointments=a; state.availability=v; render();
    });
  }
  else if (action==='show-forgot') {
    state.forgotMode=true; state.forgotType='password'; state.forgotPhone='';
    state.forgotStep='phone'; state.forgotOtp=''; state.forgotOtpInput='';
    state.error=''; render();
  }
  else if (action==='forgot-back') {
    state.forgotMode=false; state.forgotStep='phone'; state.forgotOtp='';
    state.forgotOtpInput=''; state.forgotPhone=''; state.error='';
    if (state._returnView) { state.view=state._returnView; state._returnView=null; }
    render();
  }
  else if (action==='forgot-type') {
    state.forgotType=e.currentTarget.dataset.type; render();
  }
  else if (action==='forgot-send-otp') {
    const fPrefix = document.getElementById('forgot-phone-prefix')?.value || '050';
    const fNum = (document.getElementById('forgot-phone-num')?.value || '').replace(/\D/g,'');
    const phone = fPrefix + fNum;
    if (fNum.length !== 7 || fNum.startsWith('0') || fNum.startsWith('1')) {
      state.error = fNum.length !== 7 ? 'מספר הטלפון חייב להכיל 7 ספרות' : 'מספר הטלפון לא יכול להתחיל ב-0 או 1';
      state.phoneError = true; render(); return;
    }
    state.phoneError = false;
    state.forgotPhone = phone;
    state.error = '';

    // בדיקה שהמספר קיים במערכת (רק למחיקה — לסיסמה נשלח בכל מקרה)
    state.loading = true; render();

    const doSend = async () => {
      // בדוק שהמספר קיים תמיד (לשני הסוגים)
      const clean = phone.replace(/\D/g,'');
      const users = await sbFetch(`users?phone=like.*${clean.slice(-8)}*&select=id,name,username`).catch(()=>[]);
      if (!users.length) {
        state.loading=false; state.error='מספר הטלפון לא נמצא במערכת'; render(); return;
      }
      state.forgotUserId = users[0].id;
      state.forgotUsername = users[0].username;
      // יצור קוד אקראי 4 ספרות
      const otp = String(Math.floor(1000 + Math.random() * 9000));
      state.forgotOtp = otp;
      const msgType = state.forgotType === 'delete' ? 'מחיקת חשבון' : 'איפוס סיסמה';
      const msg = `Lishay Barber: קוד אימות ל${msgType}: ${otp}. תקף ל-10 דקות.`;
      await _sl(phone, msg);
      state.forgotOtpExpiry = Date.now() + 10 * 60 * 1000; // 10 דקות
      state.loading = false;
      state.forgotStep = 'otp';
      render();
    };
    doSend().catch(()=>{ state.loading=false; state.error='שגיאה בשליחה, נסה שוב'; render(); });
  }
  else if (action==='forgot-verify-otp') {
    const input = document.getElementById('otp-input')?.value?.trim() || state.forgotOtpInput;
    if (!input) { state.error='יש להזין את הקוד'; render(); return; }
    if (Date.now() > state.forgotOtpExpiry) { state.error='הקוד פג תוקף, שלח מחדש'; render(); return; }
    if (input !== state.forgotOtp) { state.error='הקוד שגוי, נסה שוב'; render(); return; }
    state.error = '';
    state.loading = true; render();

    if (state.forgotType === 'delete') {
      state.loading = false;
      state.forgotStep = 'confirm-delete';
      render();
    } else {
      // סיסמה — מעבר לשלב בחירת סיסמה חדשה
      state.loading = false;
      state.forgotStep = 'new-password';
      render();
    }
  }
  else if (action==='forgot-set-password') {

function getLockoutKey(u) { return 'lo_' + u.toLowerCase().trim(); }
function getLockout(u) {
  try { return JSON.parse(localStorage.getItem(getLockoutKey(u))) || {count:0, lockedUntil:0}; }
  catch { return {count:0, lockedUntil:0}; }
}
function setLockout(u, data) {
  try { localStorage.setItem(getLockoutKey(u), JSON.stringify(data)); } catch {}
}
function checkLockout(u) {
  const lo = getLockout(u);
  if (lo.lockedUntil > Date.now()) {
    const secs = Math.ceil((lo.lockedUntil - Date.now()) / 1000);
    const mins = Math.ceil(secs / 60);
    return secs < 60 ? `נסה שוב בעוד ${secs} שניות` : `נסה שוב בעוד ${mins} דקות`;
  }
  return null;
}
function recordFailedAttempt(u) {
  const lo = getLockout(u);
  // Reset count if previous lockout expired
  if (lo.lockedUntil > 0 && lo.lockedUntil <= Date.now()) lo.count = 0;
  lo.count = (lo.count || 0) + 1;
  if (lo.count >= 15) {
    lo.lockedUntil = Date.now() + 60 * 60 * 1000; // שעה
  } else if (lo.count >= 10) {
    lo.lockedUntil = Date.now() + 5 * 60 * 1000;  // 5 דקות
  } else if (lo.count >= 5) {
    lo.lockedUntil = Date.now() + 1 * 60 * 1000;  // דקה
  }
  setLockout(u, lo);
  return lo;
}
function clearLockout(u) {
  try { localStorage.removeItem(getLockoutKey(u)); } catch {}
}
async function doLoginCustomer(u,p) {
  const lockMsg = checkLockout(u);
  if (lockMsg) { state.error = '🔒 ' + lockMsg; render(); return; }
  try {
    const isPhone = /^0[0-9]{9}$/.test(u.replace(/[-\s]/g,''));
    const query = isPhone
      ? `users?phone=eq.${encodeURIComponent(u.replace(/[-\s]/g,''))}&select=*`
      : `users?username=eq.${encodeURIComponent(u)}&select=*`;
    const users = await sbFetch(query);
    if (users.length > 0 && users[0].password === p) {
      clearLockout(u);
      const [a,v] = await Promise.all([getAppointments(), getAvailability().catch(()=>[])]);
      state.appointments=a; state.availability=v; state.user=users[0];
      state.view='customer'; state.selectedDate=null; state.calendarWeekOffset=0;
      state.selectedService=null; state.pendingTime=null;
      state._annShown=true;
      saveSession(users[0]);
      setTimeout(showAnnouncementPopup, 500);
    } else {
      const lo = recordFailedAttempt(u);
      if (lo.lockedUntil > Date.now()) {
        const mins = lo.count >= 15 ? 60 : lo.count >= 10 ? 5 : 1;
        state.error = `🔒 יותר מדי ניסיונות כושלים. החשבון נעול ל-${mins === 60 ? 'שעה' : mins + ' דקות'}`;
      } else {
        const remaining = 5 - (lo.count % 5);
        state.error = `שם משתמש או סיסמה שגויים (${remaining} ניסיונות נותרו לפני נעילה)`;
      }
    }
  } catch { state.error = 'שגיאת חיבור לשרת'; }
  render();
}

    } else if (modal.type==='list') {

  return `

            <div style="font-size:18px;color:#7A5533;">›</div>
          </button>
        </div>

      ` : tab==='overview' ? `
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;">

            <div style="font-size:20px;margin-bottom:4px;">📅</div>
            <div style="font-size:28px;font-weight:700;color:#c9a84c;">${state.appointments.filter(a=>a.date===today).length}</div>
            <div style="font-size:11px;color:#7A5533;margin-top:3px;">תורים היום</div>
          </button>
          <button data-action="noop" data-sadmin-filter="pending" style="background:rgba(255,152,0,0.08);border:0.5px solid rgba(255,152,0,0.2);border-radius:14px;padding:16px;text-align:center;cursor:pointer;">

            <div style="font-size:28px;font-weight:700;color:#ff9800;">${pending}</div>
            <div style="font-size:11px;color:#7A5533;margin-top:3px;">ממתינים</div>
          </button>
          <button data-action="noop" data-sadmin-filter="approved" style="background:rgba(76,175,80,0.08);border:0.5px solid rgba(76,175,80,0.2);border-radius:14px;padding:16px;text-align:center;cursor:pointer;">
            <div style="font-size:20px;margin-bottom:4px;">✅</div>
            <div style="font-size:28px;font-weight:700;color:#4caf50;">${approved}</div>
            <div style="font-size:11px;color:#7A5533;margin-top:3px;">אושרו</div>
          </button>
          <button data-action="noop" data-sadmin-filter="users" style="background:rgba(33,150,243,0.08);border:0.5px solid rgba(33,150,243,0.2);border-radius:14px;padding:16px;text-align:center;cursor:pointer;">

            </div>
            ${l.created_at ? `<div style="font-size:10.5px;color:rgba(201,168,76,0.55);margin-bottom:2px;">${(()=>{const d=new Date(l.created_at);d.setHours(d.getHours()+3);return d.getDate()+'/'+(d.getMonth()+1)+'/'+d.getFullYear()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');})()}</div>` : ''}
            <div style="font-size:11px;color:#7A5533;">${l.details||''}</div>
          </div>`).join('')}
      `}
    </div>
    <div style="height:30px;"></div>
  </div>
  ${modalHtml}`;
}


// אתחול — אם יש סשן שמור, טען נתונים אוטומטית
function ownerApproveModal(id) {
  state.ownerApproveModalId = id;
  render();
}
function ownerCancelModal(id) {
  state.ownerCancelModalId = id;
  render();
}

async function init() {
  render();
  getAnnouncement().catch(()=>null).then(function(ann) {
    if (ann && ann.active && ann.text) {
      const expired = ann.expires_at && new Date(ann.expires_at) < new Date();
      if (!expired) state.announcement = ann;
    }
  });
  if (state.user) {
    try {
      if (state.user.role==='sadmin' || state.user.role==='owner') { doSadminLoad(); return; }
      const [a, v] = await Promise.all([getAppointments(), getAvailability().catch(()=>[])]);
      state.appointments = a;
      state.availability = v;
    } catch { clearSession(); state.user=null; state.view='login'; }
    render();
  }
}
// Splash screen – set logo and auto-hide after 3.8s
(function() {
  const splashEl = document.getElementById('splash');
  const splashLogo = document.getElementById('splash-logo');
  if (splashLogo) {
    var loadLogo = function() { splashLogo.src = IMG; setTimeout(function() { splashLogo.style.opacity = '1'; }, 300); };
    if (window.requestIdleCallback) { requestIdleCallback(loadLogo, {timeout:400}); } else { setTimeout(loadLogo, 50); }
  }
  setTimeout(function() {
    if (splashEl) {
      splashEl.style.opacity = '0';
      // הצג הודעה אם קיימת
      if (state.announcement && state.announcement.active && state.announcement.text) {
        const expired = state.announcement.expires_at && new Date(state.announcement.expires_at) < new Date();
        if (!expired) {
          const popup = document.getElementById('ann-popup');
          const textEl = document.getElementById('ann-text');
          if (popup && textEl) {
            textEl.textContent = state.announcement.text;
            popup.style.display = 'flex';
            const annSecs = (state.announcement.seconds||4)*1000;
            setTimeout(function() {
              popup.style.opacity = '0';
              setTimeout(function() { popup.style.display = 'none'; }, 600);
            }, annSecs);
          }
        }
      }
      setTimeout(function() { splashEl.style.display = 'none'; }, 600);
    }
  }, 3800);
})();

// Global sadmin helpers (avoid event delegation issues)
function sadminOpenList(filter) {
  state.sadminModal = { type: 'list', filter: filter };
  render();
}
function sadminCloseModal() {
  state.sadminModal = null;
  render();
}
function sadminOpenAppt(id) {
  const appt = state.appointments.find(a => a.id === id);
  state.sadminModal = { type: 'appt', appt: appt };
  render();
}
function sadminApprove(id) {
  state.sadminModal = null;
  doUpdateApptStatus(id, 'approved', 'התור שלך אושר! נשמח לראותך.');
}

init();

// Close sadmin modals on backdrop click
document.addEventListener('click', function(e) {
  const apptModal = document.getElementById('sadmin-appt-modal');
  const listModal = document.getElementById('sadmin-list-modal');
  if (apptModal && e.target === apptModal) { sadminCloseModal(); }
  if (listModal && e.target === listModal) { sadminCloseModal(); }
});

// Polling — בודק עדכונים כל 15 שניות כשהמשתמש מחובר
setInterval(async () => {
  // רק admin מקבל רענון — לקוח ו-sadmin לא
  if (!state.user || state.view !== 'owner' || state.showAnnModal) return;
  try {
    const [appts, avail] = await Promise.all([
      getAppointments(),
      getAvailability().catch(() => state.availability)
    ]);
    state.appointments = appts;
    state.availability = avail;
    render();
  } catch {}
}, 30000);

// Event delegation
document.addEventListener('click', function(e) {
  const btn = e.target.closest('[data-action]');
  if (!btn) {
    // סגור תפריט הגדרות בלחיצה מחוץ אליו
    if (state.showSettingsMenu) { state.showSettingsMenu=false; render(); }
    return;
  }
  // אם לחצנו על כפתור בתוך תפריט ההגדרות, עצור בועבוע
  if (btn.dataset.action && btn.dataset.action.startsWith('settings-')) {
    e.stopPropagation();
  }
  const action = btn.dataset.action;
  if (!action) return;
  if (action==='modal-inner'||action==='noop') {
    // check for sadmin custom attributes
    const sf = btn.dataset.sadminFilter;
    const sa = btn.dataset.sadminApptId;
    const sd = btn.dataset.sadminDay;
    if (sd !== undefined) {
      state.sadminCalView = 'day';
      state.calendarWeekOffset = parseInt(sd);
      render();
      return;
    }
    const sp = btn.dataset.statsPeriod;
    if (sp) { state.statsPeriod = sp; render(); return; }
    if (sf) { state.sadminModal={type:'list',filter:sf}; render(); }
    else if (sa) { const ap=state.appointments.find(a=>a.id===sa); state.sadminModal={type:'appt',appt:ap}; render(); }
    return;
  }
  playClick();
  handleAction({ currentTarget: btn });
});


document.addEventListener('contextmenu',e=>e.preventDefault());
document.addEventListener('keydown',e=>{if(e.key==='F12'||(e.ctrlKey&&e.shiftKey&&['I','J','C'].includes(e.key))||(e.ctrlKey&&e.key==='U'))e.preventDefault();});
</script>
