async function sbFetch(path, options = {}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': options.prefer || 'return=representation',
    },
    ...options
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || 'שגיאת שרת');
  }
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

function generateSlots() {
  const slots = [];
  let total = WORKING_HOURS.start * 60;
  const end = WORKING_HOURS.end * 60;
  while (total < end) {
    const h = Math.floor(total / 60);
    const m = total % 60;
    slots.push(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);
    total += SLOT_DURATION;
  }
  return slots;
}

function formatPhone(p) {
  if (!p) return '';
  const d = p.replace(/\D/g,'');
  return d.length >= 3 ? d.slice(0,3) + '-' + d.slice(3) : d;
}

function getMonthDates(monthOffset) {
  const today = new Date(); today.setHours(0,0,0,0);
  const base = new Date(today.getFullYear(), today.getMonth() + monthOffset, 1);
  const year = base.getFullYear(); const month = base.getMonth();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  return { year, month, daysInMonth,
    monthName: ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'][month] };
}

// מחזיר 7 ימים החל מיום ראשון של השבוע
function getDates(weekOffset) {
  const today = new Date(); today.setHours(0,0,0,0);
  // מצא את יום ראשון של השבוע הנוכחי
  const dayOfWeek = today.getDay(); // 0=ראשון
  const sunday = new Date(today);
  sunday.setDate(today.getDate() - dayOfWeek + weekOffset * 7);
  return Array.from({length:7}, (_,i) => { const d=new Date(sunday); d.setDate(sunday.getDate()+i); return d; });
}

function formatDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function formatDisplayDate(d) {
  return {
    day: ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'][d.getDay()],
    date: d.getDate(),
    month: ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'][d.getMonth()]
  };
}

function isSlotBooked(dateStr, time) { return state.appointments.find(a => a.date===dateStr && a.time===time); }
function isPastSlot(dateStr, time) {
  const [h,m] = time.split(':').map(Number);
  const slot = new Date(dateStr); slot.setHours(h,m,0,0);
  return slot < new Date();
}

      <button data-action="owner-tab" data-tab="list" style="flex:1;min-width:60px;padding:11px 4px;background:${tab==='list'?'rgba(201,168,76,0.08)':'transparent'};border:none;border-bottom:${tab==='list'?'2px solid #c9a84c':'2px solid transparent'};color:${tab==='list'?'#c9a84c':'rgba(255,255,255,0.4)'};font-size:11px;cursor:pointer;white-space:nowrap;">📋 רשימה</button>
      <button data-action="owner-tab" data-tab="availability" style="flex:1;min-width:60px;padding:11px 4px;background:${tab==='availability'?'rgba(201,168,76,0.08)':'transparent'};border:none;border-bottom:${tab==='availability'?'2px solid #c9a84c':'2px solid transparent'};color:${tab==='availability'?'#c9a84c':'rgba(255,255,255,0.4)'};font-size:11px;cursor:pointer;white-space:nowrap;">⚙️ זמינות</button>
      <button data-action="owner-tab" data-tab="customers" style="flex:1;min-width:60px;padding:11px 4px;background:${tab==='customers'?'rgba(201,168,76,0.08)':'transparent'};border:none;border-bottom:${tab==='customers'?'2px solid #c9a84c':'2px solid transparent'};color:${tab==='customers'?'#c9a84c':'rgba(255,255,255,0.4)'};font-size:11px;cursor:pointer;white-space:nowrap;">👥 לקוחות</button>
      <button data-action="owner-tab" data-tab="logs" style="flex:1;min-width:60px;padding:11px 4px;background:${tab==='logs'?'rgba(201,168,76,0.08)':'transparent'};border:none;border-bottom:${tab==='logs'?'2px solid #c9a84c':'2px solid transparent'};color:${tab==='logs'?'#c9a84c':'rgba(255,255,255,0.4)'};font-size:11px;cursor:pointer;white-space:nowrap;">📜 לוגים</button>

function renderOwnerCalendar() {
  const dates = getDates(state.calendarWeekOffset);
  const today = formatDate(new Date());
  return `
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">
    <button data-action="week-prev" style="background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.1);color:#fff;width:36px;height:36px;border-radius:10px;cursor:pointer;font-size:18px;">‹</button>
    <span style="color:rgba(255,255,255,0.55);font-size:13px;">${formatDisplayDate(dates[0]).date} ${formatDisplayDate(dates[0]).month} – ${formatDisplayDate(dates[6]).date} ${formatDisplayDate(dates[6]).month}</span>
    <button data-action="week-next" style="background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.1);color:#fff;width:36px;height:36px;border-radius:10px;cursor:pointer;font-size:18px;">›</button>
  </div>
  <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:1rem;">
    ${dates.map(d => {
      const ds=formatDate(d); const fd=formatDisplayDate(d);
      const appts=state.appointments.filter(a=>a.date===ds);
      const isToday=ds===today; const sel=state.selectedDate===ds;
      return `<button data-action="select-date" data-date="${ds}" style="padding:10px 4px;border-radius:10px;border:${sel?'1.5px solid #c9a84c':'0.5px solid rgba(255,255,255,0.07)'};background:${sel?'rgba(201,168,76,0.15)':isToday?'rgba(255,255,255,0.07)':'transparent'};color:${sel?'#c9a84c':isToday?'#fff':'rgba(255,255,255,0.5)'};cursor:pointer;text-align:center;min-height:64px;">
        <div style="font-size:10px;color:${sel?'rgba(201,168,76,0.7)':'rgba(255,255,255,0.3)'};margin-bottom:2px;">${fd.day}'</div>
        <div style="font-size:16px;font-weight:${isToday?'600':'400'};">${fd.date}</div>
        ${appts.length>0?`<div style="width:6px;height:6px;background:#c9a84c;border-radius:50%;margin:3px auto 0;"></div>`:'<div style="height:9px;"></div>'}
      </button>`;
    }).join('')}
  </div>
  ${state.selectedDate ? renderOwnerDaySlots(state.selectedDate) : `<div style="text-align:center;color:rgba(255,255,255,0.2);padding:3rem;font-size:14px;">בחר יום לצפייה בתורים</div>`}`;
}

function renderOwnerDaySlots(dateStr) {
  const slots = generateSlots();
  const fd = formatDisplayDate(new Date(dateStr+'T12:00:00'));
  return `
  <div>
    <div style="font-size:13px;color:rgba(255,255,255,0.45);margin-bottom:12px;text-align:center;">יום ${fd.day}', ${fd.date} ${fd.month}</div>
    ${slots.map(time => {
      const appt=isSlotBooked(dateStr,time); const past=isPastSlot(dateStr,time);
      const svc=appt?SERVICES.find(s=>s.id===appt.service):null;
      return `<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;margin-bottom:6px;border-radius:12px;background:${appt?'rgba(201,168,76,0.08)':'rgba(255,255,255,0.03)'};border:0.5px solid ${appt?'rgba(201,168,76,0.25)':'rgba(255,255,255,0.05)'};">
        <span style="font-size:14px;font-weight:500;color:${appt?'#c9a84c':'rgba(255,255,255,0.3)'};min-width:44px;">${time}</span>
        ${appt?`
          <div style="flex:1;">
            <div style="font-size:14px;color:#fff;font-weight:500;">${appt.customer_name}</div>
            <div style="font-size:12px;color:rgba(255,255,255,0.4);margin-top:1px;">📞 ${formatPhone(appt.customer_phone)}</div>
            ${svc?`<div style="font-size:11px;color:rgba(201,168,76,0.7);margin-top:1px;">✂️ ${svc.name} — ₪${svc.price}</div>`:''}
          </div>
          <button data-action="owner-reschedule" data-id="${appt.id}" style="background:rgba(255,255,255,0.07);border:0.5px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.7);padding:5px 10px;border-radius:8px;font-size:11px;cursor:pointer;pointer-events:all;">שנה</button>
          <button data-action="owner-cancel" data-id="${appt.id}" style="background:rgba(220,50,50,0.12);border:0.5px solid rgba(220,50,50,0.3);color:#ff8080;padding:5px 10px;border-radius:8px;font-size:11px;cursor:pointer;pointer-events:all;">בטל</button>
        `:`<span style="font-size:13px;color:rgba(255,255,255,0.18);">${past?'עבר':'פנוי'}</span>`}
      </div>`;
    }).join('')}
  </div>`;
}

function renderOwnerAvailability() {
  const today = formatDate(new Date());
  const { year, month, daysInMonth, monthName } = getMonthDates(state.availMonthOffset);
  const days = ['א','ב','ג','ד','ה','ו','ש']; // א=ראשון
  const firstDay = new Date(year, month, 1).getDay();
  let cells = [];
  for (let i=0; i<firstDay; i++) cells.push(null);
  for (let d=1; d<=daysInMonth; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);

  const selDate = state.availSelectedDate;
  const slots = generateSlots();

  return `
  <div>
    <div style="font-size:11px;color:rgba(255,255,255,0.4);margin-bottom:12px;line-height:1.5;">בחר יום ואחר-כך סמן אילו שעות יהיו <span style="color:#4caf50;">פתוחות</span> לקביעת תור. שעות לא מסומנות יופיעו ללקוחות כ<span style="color:rgba(255,255,255,0.3);">לא זמינות</span>.</div>

    <div style="background:rgba(255,255,255,0.04);border-radius:14px;border:0.5px solid rgba(255,255,255,0.08);padding:12px;margin-bottom:12px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <button data-action="avail-month-prev" style="background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.12);color:#fff;width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:18px;line-height:1;">‹</button>
        <span style="font-size:14px;font-weight:600;color:#c9a84c;">${monthName} ${year}</span>
        <button data-action="avail-month-next" style="background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.12);color:#fff;width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:18px;line-height:1;">›</button>
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px;">
        ${days.map(d=>`<div style="text-align:center;font-size:10px;color:rgba(255,255,255,0.3);padding:2px 0;">${d}'</div>`).join('')}
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;">
        ${cells.map(d=>{
          if (!d) return `<div></div>`;
          const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
          const isPast = ds < today;
          const sel = selDate === ds;
          const openCount = state.availability.filter(a=>a.date===ds).length;
          return `<button data-action="avail-select-date" data-date="${ds}" data-past="${isPast}" style="padding:6px 2px;border-radius:8px;border:${sel?'1.5px solid #c9a84c':'0.5px solid rgba(255,255,255,0.06)'};background:${sel?'rgba(201,168,76,0.18)':'rgba(255,255,255,0.03)'};color:${isPast?'rgba(255,255,255,0.15)':'#fff'};cursor:${isPast?'default':'pointer'};text-align:center;min-height:40px;">
            <div style="font-size:13px;pointer-events:none;">${d}</div>
            ${openCount>0?`<div style="width:5px;height:5px;border-radius:50%;background:#4caf50;margin:2px auto 0;pointer-events:none;"></div>`:`<div style="height:7px;pointer-events:none;"></div>`}
          </button>`;
        }).join('')}
      </div>
    </div>

    ${selDate ? `
    <div style="background:rgba(255,255,255,0.04);border-radius:14px;border:0.5px solid rgba(255,255,255,0.08);padding:12px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
        <div style="font-size:13px;font-weight:600;color:#c9a84c;">${(()=>{const fd=formatDisplayDate(new Date(selDate+'T12:00:00'));return `יום ${fd.day}' ${fd.date} ${fd.month}`;})()}</div>
        <div style="display:flex;gap:6px;">
          <button data-action="avail-open-all" data-date="${selDate}" style="background:rgba(76,175,80,0.15);border:0.5px solid rgba(76,175,80,0.4);color:#4caf50;padding:4px 10px;border-radius:7px;font-size:11px;cursor:pointer;">פתח הכל</button>
          <button data-action="avail-close-all" data-date="${selDate}" style="background:rgba(220,50,50,0.12);border:0.5px solid rgba(220,50,50,0.3);color:#ff8080;padding:4px 10px;border-radius:7px;font-size:11px;cursor:pointer;">סגור הכל</button>
        </div>
      </div>
      <div style="font-size:11px;color:rgba(255,255,255,0.35);margin-bottom:10px;">לחץ על שעה לפתיחה/סגירה</div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;">
        ${slots.map(t=>{
          const isOpen = state.availability.some(a=>a.date===selDate&&a.time===t);
          const isBooked = state.appointments.some(a=>a.date===selDate&&a.time===t);
          return `<button data-action="avail-toggle" data-date="${selDate}" data-time="${t}" data-booked="${isBooked}" style="padding:10px 4px;border-radius:8px;border:0.5px solid ${isBooked?'rgba(201,168,76,0.3)':isOpen?'rgba(76,175,80,0.5)':'rgba(255,255,255,0.08)'};background:${isBooked?'rgba(201,168,76,0.12)':isOpen?'rgba(76,175,80,0.12)':'rgba(255,255,255,0.03)'};color:${isBooked?'#c9a84c':isOpen?'#4caf50':'rgba(255,255,255,0.3)'};cursor:${isBooked?'default':'pointer'};text-align:center;opacity:${isBooked?'0.7':'1'};">
            <div style="font-size:13px;font-weight:500;pointer-events:none;">${t}</div>
            <div style="font-size:9px;margin-top:2px;pointer-events:none;">${isBooked?'קבוע':isOpen?'פתוח':'סגור'}</div>
          </button>`;
        }).join('')}
      </div>
    </div>` : `<div style="text-align:center;color:rgba(255,255,255,0.25);padding:2rem;font-size:13px;">בחר יום לניהול השעות</div>`}
  </div>`;
}

function renderOwnerCustomers() {
  const users = state.users;
  if (!users.length) return `<div style="text-align:center;color:rgba(255,255,255,0.25);padding:3rem;font-size:14px;">אין לקוחות רשומים</div>`;
  return users.map(u => {
    const appts = state.appointments.filter(a=>a.username===u.username);
    const isResetting = state.resetPasswordId === u.id;
    return `<div style="background:rgba(255,255,255,0.04);border:0.5px solid rgba(255,255,255,0.08);border-radius:14px;padding:14px;margin-bottom:10px;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
        <div style="width:38px;height:38px;background:rgba(201,168,76,0.15);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;">👤</div>
        <div style="flex:1;">
          <div style="font-size:14px;font-weight:500;color:#fff;">${u.name}</div>
          <div style="font-size:12px;color:rgba(255,255,255,0.4);margin-top:1px;">📞 ${formatPhone(u.phone)} · @${u.username}</div>
          <div style="font-size:11px;color:rgba(201,168,76,0.6);margin-top:1px;">✂️ ${appts.length} תורים</div>
        </div>
      </div>
      ${isResetting ? `
        <div style="display:flex;gap:6px;margin-bottom:8px;">
          <input id="reset-pw-${u.id}" type="text" placeholder="סיסמה חדשה" value="${state.resetPasswordValue}" style="flex:1;background:rgba(255,255,255,0.08);border:0.5px solid rgba(255,255,255,0.2);border-radius:8px;padding:8px 10px;color:#fff;font-size:13px;outline:none;">
          <button data-action="confirm-reset-pw" data-id="${u.id}" style="background:#c9a84c;border:none;color:#1a1a2e;padding:8px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;">אשר</button>
          <button data-action="cancel-reset-pw" style="background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.5);padding:8px 10px;border-radius:8px;font-size:12px;cursor:pointer;">ביטול</button>
        </div>` : ''}
      <div style="display:flex;gap:6px;">
        <button data-action="reset-pw" data-id="${u.id}" style="flex:1;padding:7px;background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.7);border-radius:8px;font-size:12px;cursor:pointer;">🔑 איפוס סיסמה</button>
        <button data-action="delete-user" data-id="${u.id}" data-name="${u.name}" style="flex:1;padding:7px;background:rgba(220,50,50,0.1);border:0.5px solid rgba(220,50,50,0.25);color:#ff8080;border-radius:8px;font-size:12px;cursor:pointer;">🗑 מחק לקוח</button>
      </div>
    </div>`;
  }).join('');
}

function renderOwnerLogs() {
  const logs = state.logs;
  if (!logs.length) return `
    <div style="text-align:center;color:rgba(255,255,255,0.25);padding:2rem;font-size:14px;">
      <div style="font-size:32px;margin-bottom:8px;">📋</div>
      <div>אין לוגים עדיין</div>
      <button data-action="refresh-logs" style="margin-top:12px;background:rgba(201,168,76,0.12);border:0.5px solid rgba(201,168,76,0.25);color:#c9a84c;padding:6px 16px;border-radius:8px;font-size:13px;cursor:pointer;">↻ טען לוגים</button>
    </div>`;
  return `
  <div style="margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;">
    <div style="font-size:12px;color:rgba(255,255,255,0.35);">${logs.length} אירועים אחרונים</div>
    <button data-action="refresh-logs" style="background:rgba(201,168,76,0.12);border:0.5px solid rgba(201,168,76,0.25);color:#c9a84c;padding:5px 12px;border-radius:8px;font-size:12px;cursor:pointer;">↻ רענן</button>
  </div>
  ${logs.map(l => {
    const dt = new Date(l.created_at);
    const dateStr = `${dt.getDate()}/${dt.getMonth()+1}/${dt.getFullYear()} ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;
    const icons = {'קביעת תור':'📅','ביטול תור':'❌','שינוי מועד':'🔄','מחיקת לקוח':'🗑','איפוס סיסמה':'🔑','הרשמה':'👤','כניסה':'🔐'};
    const icon = Object.keys(icons).find(k=>l.action.includes(k)) ? icons[Object.keys(icons).find(k=>l.action.includes(k))] : '📋';
    return `<div style="background:rgba(255,255,255,0.03);border:0.5px solid rgba(255,255,255,0.06);border-radius:10px;padding:10px 12px;margin-bottom:6px;display:flex;gap:10px;align-items:flex-start;">
      <div style="font-size:18px;flex-shrink:0;">${icon}</div>
      <div style="flex:1;">
        <div style="font-size:13px;color:#fff;font-weight:500;">${l.action}</div>
        ${l.details?`<div style="font-size:11px;color:rgba(255,255,255,0.4);margin-top:2px;">${l.details}</div>`:''}
        ${l.username?`<div style="font-size:11px;color:rgba(201,168,76,0.5);margin-top:1px;">@${l.username}</div>`:''}
      </div>
      <div style="font-size:10px;color:rgba(255,255,255,0.25);white-space:nowrap;">${dateStr}</div>
    </div>`;
  }).join('')}`;
}

  const a = state.rescheduleAppt;
  const dates = getDates(state.rescheduleWeekOffset);
  const today = formatDate(new Date());
  return `
  <div style="position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;display:flex;align-items:flex-end;">
    <div style="background:#1a1a2e;border-radius:20px 20px 0 0;width:100%;padding:1.5rem;max-height:85vh;overflow-y:auto;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">
        <div style="font-size:15px;font-weight:600;color:#c9a84c;">שינוי מועד — ${a.customer_name}</div>
        <button data-action="close-reschedule" style="background:rgba(255,255,255,0.08);border:none;color:#fff;width:32px;height:32px;border-radius:50%;font-size:18px;cursor:pointer;">✕</button>
      </div>
      <div style="font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:1rem;">תור נוכחי: ${a.date} בשעה ${a.time}</div>

      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <button data-action="resc-week-prev" style="background:rgba(255,255,255,0.08);border:0.5px solid rgba(255,255,255,0.15);color:#fff;width:36px;height:36px;border-radius:8px;cursor:pointer;font-size:18px;">‹</button>
        <span style="color:rgba(255,255,255,0.5);font-size:12px;">${formatDisplayDate(dates[0]).date} ${formatDisplayDate(dates[0]).month} – ${formatDisplayDate(dates[6]).date} ${formatDisplayDate(dates[6]).month}</span>
        <button data-action="resc-week-next" style="background:rgba(255,255,255,0.08);border:0.5px solid rgba(255,255,255,0.15);color:#fff;width:36px;height:36px;border-radius:8px;cursor:pointer;font-size:18px;">›</button>
      </div>

      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:14px;">
        ${dates.map(d=>{
          const ds=formatDate(d); const fd2=formatDisplayDate(d);
          const isPast=ds<today; const sel=state.rescheduleDate===ds;
          return `<button data-action="${isPast?'':'resc-select-date'}" data-date="${ds}" style="padding:10px 2px;border-radius:8px;border:${sel?'1.5px solid #c9a84c':'0.5px solid rgba(255,255,255,0.08)'};background:${sel?'rgba(201,168,76,0.18)':'rgba(255,255,255,0.04)'};color:${sel?'#c9a84c':isPast?'rgba(255,255,255,0.15)':'rgba(255,255,255,0.65)'};cursor:${isPast?'default':'pointer'};text-align:center;min-height:54px;">
            <div style="font-size:9px;color:${sel?'rgba(201,168,76,0.7)':'rgba(255,255,255,0.3)'};margin-bottom:3px;">${fd2.day}'</div>
            <div style="font-size:15px;">${fd2.date}</div>
          </button>`;
        }).join('')}
      </div>

      ${state.rescheduleDate ? `
        <div style="font-size:12px;color:rgba(255,255,255,0.5);margin-bottom:8px;">בחר שעה חדשה:</div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px;">
          ${generateSlots().map(t=>{
            const taken=state.appointments.find(x=>x.date===state.rescheduleDate&&x.time===t&&x.id!==a.id);
            const past=isPastSlot(state.rescheduleDate,t);
            const dis=taken||past; const sel=state.rescheduleTime===t;
            return `<button data-action="${dis?'':'resc-select-time'}" data-time="${t}" style="padding:10px 4px;border-radius:8px;border:${sel?'1.5px solid #c9a84c':'0.5px solid rgba(255,255,255,0.08)'};background:${sel?'rgba(201,168,76,0.18)':dis?'rgba(255,255,255,0.02)':'rgba(255,255,255,0.05)'};color:${sel?'#c9a84c':dis?'rgba(255,255,255,0.12)':'rgba(255,255,255,0.7)'};cursor:${dis?'default':'pointer'};font-size:13px;text-align:center;">
              <div style="pointer-events:none;">${t}</div>
              <div style="font-size:9px;color:${dis?'rgba(255,255,255,0.1)':sel?'#c9a84c':'rgba(255,255,255,0.3)'};margin-top:2px;pointer-events:none;">${dis?'תפוס':'פנוי'}</div>
            </button>`;
          }).join('')}
        </div>
        ${state.rescheduleTime ? `
          <button data-action="confirm-reschedule" style="width:100%;padding:14px;background:#c9a84c;border:none;border-radius:12px;color:#1a1a2e;font-size:16px;font-weight:700;cursor:pointer;">
            ✓ אשר — ${state.rescheduleDate} בשעה ${state.rescheduleTime}
          </button>` : ''}
      ` : `<div style="text-align:center;color:rgba(255,255,255,0.3);font-size:13px;padding:1rem;">בחר יום חדש למעלה</div>`}
    </div>
  </div>`;
}

function renderOwnerList() {
  const today = formatDate(new Date());
  let allUpcoming = state.appointments.filter(a=>a.date>=today);

  // סינון לפי כפתור סטטיסטיקה
  let filtered = allUpcoming;
  let filterLabel = '';
  if (state.listFilter==='today') { filtered = allUpcoming.filter(a=>a.date===today); filterLabel='📅 תורים היום'; }
  else if (state.listFilter==='upcoming') { filtered = allUpcoming.filter(a=>a.status==='approved'); filterLabel='✓ תורים קבועים'; }
  else if (state.listFilter==='pending') { filtered = allUpcoming.filter(a=>a.status==='pending'); filterLabel='⏳ ממתינים לאישור'; }

  const upcoming = filtered.sort((a,b)=>{
    if(a.status==='pending'&&b.status!=='pending') return -1;
    if(a.status!=='pending'&&b.status==='pending') return 1;
    return (a.date+a.time).localeCompare(b.date+b.time);
  });
  const filterBar = filterLabel ? `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;"><div style="font-size:12px;color:#c9a84c;font-weight:500;">${filterLabel}</div><button data-action="stat-click" data-filter="${state.listFilter}" style="background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.5);padding:3px 10px;border-radius:7px;font-size:11px;cursor:pointer;">✕ נקה</button></div>` : '';
  if (!upcoming.length) return filterBar+`<div style="text-align:center;color:rgba(255,255,255,0.2);padding:3rem;font-size:14px;">אין תורים</div>`;
  const pending = upcoming.filter(a=>a.status==='pending');
  const others = upcoming.filter(a=>a.status!=='pending');
  const renderAppt = (a) => {
    const fd=formatDisplayDate(new Date(a.date+'T12:00:00'));
    const svc=SERVICES.find(s=>s.id===a.service);
    const isPending=a.status==='pending';
    const statusColor=isPending?'#ff9800':a.status==='approved'?'#4caf50':'rgba(255,255,255,0.3)';
    const statusText=isPending?'⏳ ממתין לאישור':a.status==='approved'?'✓ אושר':'✗ נדחה';
    return `<div style="background:${isPending?'rgba(255,152,0,0.06)':'rgba(255,255,255,0.04)'};border:${isPending?'1px solid rgba(255,152,0,0.3)':'0.5px solid rgba(255,255,255,0.08)'};border-radius:14px;padding:12px 14px;margin-bottom:10px;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
        <div style="background:rgba(201,168,76,0.12);border-radius:10px;padding:8px 10px;text-align:center;min-width:50px;">
          <div style="font-size:20px;font-weight:600;color:#c9a84c;line-height:1;">${fd.date}</div>
          <div style="font-size:10px;color:rgba(201,168,76,0.6);margin-top:1px;">${fd.month}</div>
        </div>
        <div style="flex:1;">
          <div style="font-size:14px;font-weight:500;color:#fff;">${a.customer_name}</div>
          <div style="font-size:12px;color:rgba(255,255,255,0.4);margin-top:1px;">📞 ${formatPhone(a.customer_phone)}</div>
          ${svc?`<div style="font-size:11px;color:rgba(201,168,76,0.7);margin-top:1px;">✂️ ${svc.name} — ₪${svc.price}</div>`:''}
        </div>
        <div style="text-align:right;">
          <div style="font-size:16px;font-weight:600;color:#c9a84c;">${a.time}</div>
          <div style="font-size:10px;color:${statusColor};margin-top:3px;">${statusText}</div>
        </div>
      </div>
      ${isPending?`
      <div style="margin-bottom:8px;">
        <input id="note-${a.id}" type="text" placeholder="הוסף הערה ללקוח (אופציונלי)" style="width:100%;background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.15);border-radius:8px;padding:7px 10px;color:#fff;font-size:12px;outline:none;">
      </div>
      <div style="display:flex;gap:6px;">
        <button data-action="approve-appt" data-id="${a.id}" style="flex:1;padding:8px;background:rgba(76,175,80,0.15);border:0.5px solid rgba(76,175,80,0.4);color:#4caf50;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;">✓ אשר תור</button>
        <button data-action="reject-appt" data-id="${a.id}" style="flex:1;padding:8px;background:rgba(244,67,54,0.12);border:0.5px solid rgba(244,67,54,0.3);color:#f44336;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;">✗ דחה תור</button>
        <button data-action="owner-reschedule" data-id="${a.id}" style="padding:8px 10px;background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.6);border-radius:8px;font-size:12px;cursor:pointer;">📅</button>
      </div>`:`
      <div style="display:flex;gap:6px;">
        <button data-action="owner-reschedule" data-id="${a.id}" style="flex:1;padding:7px;background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.7);border-radius:8px;font-size:12px;cursor:pointer;">📅 שנה מועד</button>
        <button data-action="owner-cancel" data-id="${a.id}" style="flex:1;padding:7px;background:rgba(220,50,50,0.08);border:0.5px solid rgba(220,50,50,0.2);color:#ff8080;border-radius:8px;font-size:12px;cursor:pointer;">🗑 בטל</button>
      </div>`}
    </div>`;
  };
  return filterBar+(pending.length?`<div style="font-size:11px;color:#ff9800;margin-bottom:8px;letter-spacing:0.5px;">⏳ ממתינים לאישור (${pending.length})</div>`+pending.map(renderAppt).join(''):'')
    +(others.length?`<div style="font-size:11px;color:rgba(255,255,255,0.3);margin-bottom:8px;margin-top:${pending.length?'12px':'0'};letter-spacing:0.5px;">תורים קרובים</div>`+others.map(renderAppt).join(''):'')
}

function renderMonthCalendar() {
  const today = formatDate(new Date());
  const { year, month, daysInMonth, monthName } = getMonthDates(state.calendarWeekOffset);
  const days = ['א','ב','ג','ד','ה','ו','ש']; // א=ראשון
  // יום ראשון של החודש (0=ראשון)
  const firstDay = new Date(year, month, 1).getDay();
  // בונה גריד: ריקים לפני, אחר-כך ימים
  let cells = [];
  for (let i=0; i<firstDay; i++) cells.push(null);
  for (let d=1; d<=daysInMonth; d++) cells.push(d);
  // משלים לשורה שלמה
  while (cells.length % 7 !== 0) cells.push(null);

  return `
  <div style="background:#fff;border-radius:14px;border:0.5px solid rgba(26,26,46,0.1);padding:12px;margin-bottom:12px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
      <button data-action="cust-month-prev" style="background:rgba(26,26,46,0.06);border:0.5px solid rgba(26,26,46,0.12);color:#1a1a2e;width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:18px;line-height:1;">‹</button>
      <span style="font-size:14px;font-weight:600;color:#1a1a2e;">${monthName} ${year}</span>
      <button data-action="cust-month-next" style="background:rgba(26,26,46,0.06);border:0.5px solid rgba(26,26,46,0.12);color:#1a1a2e;width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:18px;line-height:1;">›</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px;">
      ${days.map(d=>`<div style="text-align:center;font-size:10px;color:rgba(26,26,46,0.35);padding:2px 0;">${d}'</div>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;">
      ${cells.map(d=>{
        if (!d) return `<div></div>`;
        const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const isPast = ds < today;
        const isToday = ds === today;
        const sel = state.selectedDate === ds;
        const freeCount = isPast ? 0 : state.availability.filter(a=>a.date===ds&&!isSlotBooked(ds,a.time)&&!isPastSlot(ds,a.time)).length;
        return `<button data-action="${isPast?'':'cust-select-date'}" data-date="${ds}" style="padding:6px 2px;border-radius:8px;border:${sel?'1.5px solid #c9a84c':isToday?'1.5px solid rgba(26,26,46,0.3)':'0.5px solid transparent'};background:${sel?'#1a1a2e':isToday?'rgba(26,26,46,0.06)':'transparent'};color:${sel?'#c9a84c':isPast?'rgba(26,26,46,0.2)':'#1a1a2e'};cursor:${isPast?'default':'pointer'};text-align:center;min-height:42px;position:relative;">
          <div style="font-size:14px;font-weight:${isToday?'700':'400'};pointer-events:none;">${d}</div>
          ${!isPast&&freeCount>0?`<div style="width:5px;height:5px;border-radius:50%;background:${sel?'#c9a84c':'#4caf50'};margin:2px auto 0;pointer-events:none;"></div>`:`<div style="height:7px;pointer-events:none;"></div>`}
        </button>`;
      }).join('')}
    </div>
  </div>`;
}

    return `<div style="background:#fff;border-radius:14px;border:0.5px solid rgba(26,26,46,0.1);padding:20px;text-align:center;margin-bottom:12px;">
      <div style="font-size:32px;margin-bottom:8px;">😴</div>
      <div style="font-size:14px;color:rgba(26,26,46,0.5);">אין שעות פנויות ביום זה</div>
      <button data-action="cust-clear-date" style="margin-top:10px;background:rgba(26,26,46,0.06);border:0.5px solid rgba(26,26,46,0.1);color:rgba(26,26,46,0.6);padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer;">בחר יום אחר</button>
    </div>`;
  }

  if (!state.pendingTime) {
    return `
    <div style="background:#fff;border-radius:14px;border:0.5px solid rgba(26,26,46,0.1);padding:12px;margin-bottom:12px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <div style="font-size:13px;font-weight:600;color:#1a1a2e;">יום ${fd.day}' ${fd.date} ${fd.month} — בחר שעה</div>
        <button data-action="cust-clear-date" style="background:rgba(26,26,46,0.06);border:0.5px solid rgba(26,26,46,0.1);color:rgba(26,26,46,0.5);padding:4px 10px;border-radius:8px;font-size:12px;cursor:pointer;">✕</button>

        ${availSlots.map(time=>{
          const booked=isSlotBooked(ds,time);
          const myBooking=booked&&booked.username===state.user.username;
          const disabled=!!booked;
          return `<button data-action="pick-time" data-time="${time}" data-disabled="${disabled}" style="padding:10px 4px;border-radius:8px;border:0.5px solid ${myBooking?'#c9a84c':booked?'rgba(26,26,46,0.06)':'rgba(26,26,46,0.15)'};background:${myBooking?'rgba(201,168,76,0.1)':booked?'rgba(26,26,46,0.03)':'#f9f9f9'};color:${myBooking?'#c9a84c':booked?'rgba(26,26,46,0.2)':'#1a1a2e'};cursor:${disabled?'default':'pointer'};text-align:center;">
            <div style="font-size:13px;font-weight:500;pointer-events:none;">${time}</div>
            <div style="font-size:9px;margin-top:2px;color:${myBooking?'#c9a84c':booked?'rgba(26,26,46,0.25)':'#4caf50'};pointer-events:none;">${myBooking?'שלי':booked?'תפוס':'פנוי'}</div>
          </button>`;
        }).join('')}
      </div>
    </div>`;
  }

  // שלב אישור
  const service = SERVICES.find(s=>s.id===state.selectedService);
  return `
  <div style="background:#fff;border-radius:14px;border:0.5px solid rgba(26,26,46,0.1);padding:16px;margin-bottom:12px;">
    <div style="font-size:14px;font-weight:600;color:#1a1a2e;margin-bottom:14px;">אישור תור</div>
    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:16px;">
      <div style="display:flex;justify-content:space-between;font-size:13px;"><span style="color:rgba(26,26,46,0.5);">שירות</span><span style="color:#1a1a2e;font-weight:500;">✂️ ${service?.name}</span></div>
      <div style="display:flex;justify-content:space-between;font-size:13px;"><span style="color:rgba(26,26,46,0.5);">תאריך</span><span style="color:#1a1a2e;font-weight:500;">${fd.date} ${fd.month}</span></div>
      <div style="display:flex;justify-content:space-between;font-size:13px;"><span style="color:rgba(26,26,46,0.5);">שעה</span><span style="color:#1a1a2e;font-weight:500;">${state.pendingTime}</span></div>
      <div style="display:flex;justify-content:space-between;font-size:13px;border-top:0.5px solid rgba(26,26,46,0.08);padding-top:8px;"><span style="color:rgba(26,26,46,0.5);">מחיר</span><span style="color:#a07828;font-weight:700;">₪${service?.price}</span></div>
    </div>
    <div style="display:flex;gap:8px;">
      <button data-action="back-to-time" style="flex:1;padding:11px;background:rgba(26,26,46,0.06);border:0.5px solid rgba(26,26,46,0.1);color:rgba(26,26,46,0.6);border-radius:10px;font-size:13px;cursor:pointer;">← חזור</button>
      <button data-action="confirm-booking" style="flex:2;padding:11px;background:#1a1a2e;border:none;border-radius:10px;color:#c9a84c;font-size:14px;font-weight:700;cursor:pointer;">✓ קבע תור</button>
    </div>

}

function handleAction(e) {
  const action = e.currentTarget.dataset.action;
  state.error=''; state.success='';

  if (action==='toggle-mode') {
    state.registerMode = e.currentTarget.dataset.mode==='register';
    state.form={}; render();
  }
  else if (action==='login') {
    const u=state.form.username||document.getElementById('login-user')?.value||'';
    const p=state.form.password||document.getElementById('login-pass')?.value||'';
    if (u===OWNER.username && p===OWNER.password) {
      doLoginOwner();
    } else {
      doLoginCustomer(u, p);
    }
  }
  else if (action==='register') {
    const name=state.form.name||document.getElementById('reg-name')?.value||'';
    const phone=state.form.phone||document.getElementById('reg-phone')?.value||'';
    const username=state.form.username||document.getElementById('reg-user')?.value||'';
    const password=state.form.password||document.getElementById('reg-pass')?.value||'';
    if (!name||!phone||!username||!password) { state.error='יש למלא את כל השדות'; render(); return; }
    if (username==='admin') { state.error='שם משתמש זה שמור'; render(); return; }
    doRegister(name, phone, username, password);
  }
  else if (action==='logout') { state.user=null; state.view='login'; state.form={}; state.selectedDate=null; state.appointments=[]; clearSession(); render(); }
  else if (action==='owner-tab') {
    state.ownerTab=e.currentTarget.dataset.tab;
    render();
    if (state.ownerTab==='customers') doLoadUsers();
    else if (state.ownerTab==='logs') doLoadLogs();
    else doRefresh();
  }
  else if (action==='stat-click') {
    const filter = e.currentTarget.dataset.filter;
    state.listFilter = state.listFilter === filter ? null : filter;
    state.ownerTab = 'list';
    render();
  }
  else if (action==='refresh-logs') { doLoadLogs(); }
  else if (action==='approve-appt') {
    const id=e.currentTarget.dataset.id;
    const note=document.getElementById('note-'+id)?.value||'';
    doUpdateApptStatus(id,'approved',note||'התור שלך אושר! נשמח לראותך.');
  }
  else if (action==='reject-appt') {
    const id=e.currentTarget.dataset.id;
    const note=document.getElementById('note-'+id)?.value||'';
    doUpdateApptStatus(id,'rejected',note||'מצטערים, לא ניתן לאשר את התור בזמן זה.');
  }
  else if (action==='dismiss-notification') {
    const id=e.currentTarget.dataset.id;
    if(!state.seenNotifications.includes(id)) state.seenNotifications.push(id);
    localStorage.setItem('barber_seen_notifs', JSON.stringify(state.seenNotifications));
    render();
  }
  else if (action==='reset-pw') {
    state.resetPasswordId=e.currentTarget.dataset.id;
    state.resetPasswordValue='';
    render();
    // focus the input
    setTimeout(()=>{ const el=document.getElementById('reset-pw-'+state.resetPasswordId); if(el)el.focus(); },50);
  }
  else if (action==='cancel-reset-pw') { state.resetPasswordId=null; state.resetPasswordValue=''; render(); }
  else if (action==='confirm-reset-pw') {
    const id=e.currentTarget.dataset.id;
    const inp=document.getElementById('reset-pw-'+id);
    const pw=inp?inp.value:state.resetPasswordValue;
    if (!pw||pw.length<2) { state.error='סיסמה קצרה מדי'; render(); return; }
    const u=state.users.find(x=>x.id===id);
    doResetPassword(id, pw, u?.username||'', u?.name||'');
  }
  else if (action==='delete-user') {
    const id=e.currentTarget.dataset.id;
    const name=e.currentTarget.dataset.name;
    if (!confirm(`למחוק את הלקוח ${name}? כל התורים שלו יימחקו גם כן.`)) return;
    doDeleteUser(id, name);
  }
  else if (action==='avail-month-prev') { if(state.availMonthOffset>0)state.availMonthOffset--; render(); }
  else if (action==='avail-month-next') { state.availMonthOffset++; render(); }
  else if (action==='avail-select-date') { if(e.currentTarget.dataset.past==='true') return; state.availSelectedDate=e.currentTarget.dataset.date; render(); }
  else if (action==='avail-toggle') {
    const date=e.currentTarget.dataset.date; const time=e.currentTarget.dataset.time;
    if(e.currentTarget.dataset.booked==='true') return;
    doAvailToggle(date, time);
  }
  else if (action==='avail-open-all') { doAvailOpenAll(e.currentTarget.dataset.date); }
  else if (action==='avail-close-all') { doAvailCloseAll(e.currentTarget.dataset.date); }
  else if (action==='week-prev') { if(state.calendarWeekOffset>0)state.calendarWeekOffset--; render(); }
  else if (action==='week-next') { state.calendarWeekOffset++; render(); }
  else if (action==='choose-service') {
    state.selectedService=e.currentTarget.dataset.service;
    state.selectedDate=null; state.bookingStep='date'; state.pendingTime=null;
    render();
  }
  else if (action==='clear-service') {
    state.selectedService=null; state.selectedDate=null; state.bookingStep='date'; state.pendingTime=null;
    render();
  }
  else if (action==='cust-month-prev') { if(state.calendarWeekOffset>0)state.calendarWeekOffset--; render(); }
  else if (action==='cust-month-next') { state.calendarWeekOffset++; render(); }
  else if (action==='select-date') { state.selectedDate=e.currentTarget.dataset.date; render(); }
  else if (action==='cust-select-date') { if(e.currentTarget.dataset.past==='true') return; state.selectedDate=e.currentTarget.dataset.date; state.bookingStep='date'; state.pendingTime=null; render(); }
  else if (action==='cust-clear-date') { state.selectedDate=null; state.bookingStep='date'; render(); }
  else if (action==='pick-time') {
    if(e.currentTarget.dataset.disabled==='true') return;
    state.pendingTime = e.currentTarget.dataset.time;
    render();
  }
  else if (action==='back-to-time') { state.pendingTime=null; render(); }
  else if (action==='select-service') {
    state.selectedService = e.currentTarget.dataset.service;
    render();
  }
  else if (action==='confirm-booking') {
    const date=state.selectedDate; const time=state.pendingTime;
    const serviceId=state.selectedService;
    const service=SERVICES.find(s=>s.id===serviceId);
    if (!date||!time||!service) return;
    if (isSlotBooked(date,time)) { state.error='השעה כבר תפוסה'; state.bookingStep='date'; state.selectedService=null; render(); return; }
    const existing=state.appointments.find(a=>a.date===date&&a.username===state.user.username);
    if (existing) { state.error='כבר קבעת תור לאותו יום'; state.bookingStep='date'; state.selectedService=null; render(); return; }
    doBooking(date, time, serviceId, service);
  }
  else if (action==='owner-cancel') {
    const id=e.currentTarget.dataset.id;
    if (!confirm('לבטל את התור?')) return;
    doCancelAppt(id, true);
  }
  else if (action==='owner-reschedule') {
    const id=e.currentTarget.dataset.id;
    state.rescheduleAppt=state.appointments.find(a=>a.id===id);
    state.rescheduleDate=null; state.rescheduleTime=null; state.rescheduleWeekOffset=0;
    render();
  }
  else if (action==='close-reschedule') { state.rescheduleAppt=null; state.rescheduleDate=null; state.rescheduleTime=null; render(); }
  else if (action==='resc-week-prev') { if(state.rescheduleWeekOffset>0)state.rescheduleWeekOffset--; render(); }
  else if (action==='resc-week-next') { state.rescheduleWeekOffset++; render(); }
  else if (action==='resc-select-date') { if(e.currentTarget.dataset.past==='true') return; state.rescheduleDate=e.currentTarget.dataset.date; state.rescheduleTime=null; render(); }
  else if (action==='resc-select-time') { if(e.currentTarget.dataset.dis==='true') return; state.rescheduleTime=e.currentTarget.dataset.time; render(); }
  else if (action==='confirm-reschedule') {
    const a=state.rescheduleAppt;
    const newDate=state.rescheduleDate; const newTime=state.rescheduleTime;
    if (!a||!newDate||!newTime) return;
    doReschedule(a, newDate, newTime);
  }
  else if (action==='cancel-appt') {
    const id=e.currentTarget.dataset.id;
    doCancelAppt(id, false);
  }
}

// ===== Async helpers =====
async function doLoginOwner() {
  try { const [a,v]=await Promise.all([getAppointments().catch(()=>[]),getAvailability().catch(()=>[])]); state.appointments=a; state.availability=v; state.user=OWNER; state.view='owner'; state.selectedDate=null; state.calendarWeekOffset=0; saveSession(OWNER); } catch { state.error='שגיאת חיבור'; } render();
}
async function doLoginCustomer(u,p) {
  try { const users=await sbFetch(`users?username=eq.${encodeURIComponent(u)}&select=*`); if(users.length>0&&users[0].password===p){const [a,v]=await Promise.all([getAppointments(),getAvailability().catch(()=>[])]);state.appointments=a;state.availability=v;state.user=users[0];state.view='customer';state.selectedDate=null;state.calendarWeekOffset=0;state.selectedService=null;state.pendingTime=null; saveSession(users[0]);}else{state.error='שם משתמש או סיסמה שגויים';} } catch { state.error='שגיאת חיבור לשרת'; } render();
}
async function doRegister(name,phone,username,password) {
  try { const ex=await sbFetch(`users?username=eq.${encodeURIComponent(username)}&select=id`); if(ex.length>0){state.error='שם המשתמש כבר קיים';render();return;} const nu=await createUser({name,phone,username,password}); const [a,v]=await Promise.all([getAppointments(),getAvailability().catch(()=>[])]); state.appointments=a;state.availability=v;state.user=nu[0];state.view='customer';state.selectedDate=null;state.calendarWeekOffset=0;state.selectedService=null;state.pendingTime=null; saveSession(nu[0]); await addLog('הרשמה חדשה', `שם: ${name} | טלפון: ${phone} | משתמש: ${username} | סיסמה: ${password}`, username).catch(()=>{}); } catch(err){state.error=err.message||'שגיאה ביצירת חשבון';} render();
}
async function doRefresh() {
  try { const [a,v]=await Promise.all([getAppointments(),getAvailability()]); state.appointments=a; state.availability=v; } catch {} render();
}
async function doBooking(date,time,serviceId,service) {
  try { const appt=await createAppointment({date,time,username:state.user.username,customer_name:state.user.name,customer_phone:state.user.phone,service:serviceId,status:'pending',notification:''}); state.appointments.push(appt[0]); const fd=formatDisplayDate(new Date(date+'T12:00:00')); state.success=`⏳ קיבלנו את בקשתך!\nהתור ב-${fd.date} ${fd.month} שעה ${time}\n${service.name} — ₪${service.price}\nהתור במצב המתנה לאישור המספר`; state.bookingStep='date';state.pendingTime=null;state.selectedService=null;state.selectedDate=null;state.calendarWeekOffset=0; await addLog('קביעת תור', `${date} ${time} | ${service.name}`, state.user.username).catch(()=>{}); } catch(err){state.error='שגיאה בקביעת תור: '+(err.message||'');} render();
}
async function doCancelAppt(id) {
  const a=state.appointments.find(x=>x.id===id);
  try { await deleteAppointment(id); state.appointments=state.appointments.filter(x=>x.id!==id); if(a) await addLog('ביטול תור', `${a.date} ${a.time}`, a.username||'').catch(()=>{}); } catch { state.error='שגיאה בביטול'; } render();
}
async function doReschedule(a,newDate,newTime) {
  try { await deleteAppointment(a.id); const appt=await createAppointment({date:newDate,time:newTime,username:a.username,customer_name:a.customer_name,customer_phone:a.customer_phone,service:a.service}); state.appointments=state.appointments.filter(x=>x.id!==a.id); state.appointments.push(appt[0]); state.rescheduleAppt=null;state.rescheduleDate=null;state.rescheduleTime=null; } catch { state.error='שגיאה בשינוי מועד'; } render();
}
async function doAvailToggle(date,time) {
  const isOpen=state.availability.some(a=>a.date===date&&a.time===time);
  try { if(isOpen){await removeAvailability(date,time);state.availability=state.availability.filter(a=>!(a.date===date&&a.time===time));}else{await addAvailability(date,time);state.availability.push({date,time});} } catch(err){state.error='שגיאה: '+err.message;} render();
}
async function doAvailOpenAll(date) {
  const toAdd=generateSlots().filter(t=>!state.availability.some(a=>a.date===date&&a.time===t));
  try { for(const t of toAdd){await addAvailability(date,t);state.availability.push({date,time:t});} } catch(err){state.error='שגיאה: '+err.message;} render();
}
async function doAvailCloseAll(date) {
  const toRemove=state.availability.filter(a=>a.date===date&&!state.appointments.some(ap=>ap.date===date&&ap.time===a.time));
  try { for(const a of toRemove){await removeAvailability(a.date,a.time);} state.availability=state.availability.filter(a=>!(a.date===date&&toRemove.some(r=>r.time===a.time))); } catch(err){state.error='שגיאה: '+err.message;} render();
}
async function doUpdateApptStatus(id, status, notification) {
  try {
    await updateAppointmentStatus(id, status, notification);
    const idx = state.appointments.findIndex(a=>a.id===id);
    if(idx>=0) { state.appointments[idx].status=status; state.appointments[idx].notification=notification; }
    const apptInfo = state.appointments.find(a=>a.id===id); await addLog(status==='approved'?'אישור תור':'דחיית תור', `${apptInfo?.customer_name||''} | ${apptInfo?.date||''} ${apptInfo?.time||''} | ${notification}`, apptInfo?.username||'').catch(()=>{});
  } catch(err) { state.error='שגיאה: '+err.message; }
  render();
}
async function doLoadUsers() {
  try { state.users = await getAllUsers(); } catch(err) { state.error='שגיאה בטעינת לקוחות'; }
  render();
}
async function doLoadLogs() {
  try { state.logs = await getLogs(); } catch(err) { state.error='שגיאה בטעינת לוגים'; }
  render();
}
async function doResetPassword(id, password, username, name) {
  try {
    await updateUserPassword(id, password);
    await addLog('איפוס סיסמה', `סיסמה אופסה ללקוח: ${name}`, username);
    state.resetPasswordId=null; state.resetPasswordValue='';
  } catch(err) { state.error='שגיאה: '+err.message; }
  render();
}
async function doDeleteUser(id, name) {
  try {
    const u = state.users.find(x=>x.id===id);
    const userAppts = u ? state.appointments.filter(a=>a.username===u.username) : [];
    for (const a of userAppts) await deleteAppointment(a.id).catch(()=>{});
    await deleteUser(id);
    await addLog('מחיקת לקוח', `נמחק: ${name}`, u?.username||'');
    state.users = state.users.filter(x=>x.id!==id);
    state.appointments = state.appointments.filter(a=>!userAppts.find(x=>x.id===a.id));
  } catch(err) { state.error='שגיאה: '+err.message; }
  render();
}

// לוגים גם לפעולות לקוח - מובנים ב-helpers

// אתחול — אם יש סשן שמור, טען נתונים אוטומטית
async function init() {
  render(); // הצג מיד (עם loading אם צריך)
  if (state.user) {
    try {
      const [a, v] = await Promise.all([getAppointments(), getAvailability().catch(()=>[])]);
      state.appointments = a;
      state.availability = v;
    } catch { clearSession(); state.user=null; state.view='login'; }
    render();
  }
}
init();

// Event delegation
document.addEventListener('click', function(e) {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const action = btn.dataset.action;
  if (!action) return;
  handleAction({ currentTarget: btn });
});
</script>
</body>
</html>
