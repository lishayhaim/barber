ht="30" viewBox="0 0 24 24" fill="none"><circle cx="9" cy="8" r="3.5" stroke="#c9a84c" stroke-width="1.6" fill="none"/><path d="M3 20c0-4 2.7-6 6-6s6 2 6 6" stroke="#c9a84c" stroke-width="1.6" stroke-linecap="round" fill="none"/><circle cx="17" cy="9" r="2.5" stroke="#c9a84c" stroke-width="1.4" fill="none" opacity="0.7"/><path d="M20 20c0-3-1.5-4.5-3.5-5" stroke="#c9a84c" stroke-width="1.4" stroke-linecap="round" opacity="0.7"/></svg></div><div style="font-size:11px;font-weight:600;text-align:center;line-height:1.35;color:${"customers"===tab?"#c9a84c":"rgba(255,255,255,0.45)"};pointer-events:none;">לקוחות</div></button>\n    </div>\n    <div style="flex:1;padding:1rem;overflow-y:auto;">\n      ${"calendar"===tab?renderOwnerCalendar():"list"===tab?renderOwnerList():"availability"===tab?renderOwnerAvailability():"customers"===tab?renderOwnerCustomers():renderOwnerLogs()}\n    </div>\n  </div>\n  ${state.rescheduleAppt?renderRescheduleModal():""}`}function renderOwnerCalendar(){const dates=getDates(state.calendarWeekOffset),today=formatDate(new Date);return`\n  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">\n    <button data-action="week-prev" style="background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.1);color:#fff;width:36px;height:36px;border-radius:10px;cursor:pointer;font-size:19.8px;">‹</button>\n    <span style="color:rgba(255,255,255,0.55);font-size:14.3px;">${formatDisplayDate(dates[0]).date} ${formatDisplayDate(dates[0]).month} – ${formatDisplayDate(dates[6]).date} ${formatDisplayDate(dates[6]).month}</span>\n    <button data-action="week-next" style="background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.1);color:#fff;width:36px;height:36px;border-radius:10px;cursor:pointer;font-size:19.8px;">›</button>\n  </div>\n  <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:1rem;">\n    ${dates.map(d=>{const ds=formatDate(d),fd=formatDisplayDate(d),appts=state.appointments.filter(a=>a.date===ds),isToday=ds===today,sel=state.selectedDate===ds;return`<button data-action="select-date" data-date="${ds}" style="padding:10px 4px;border-radius:10px;border:${sel?"1.5px solid #c9a84c":"0.5px solid rgba(255,255,255,0.07)"};background:${sel?"rgba(201,168,76,0.15)":isToday?"rgba(255,255,255,0.07)":"transparent"};color:${sel?"#c9a84c":isToday?"#fff":"rgba(255,255,255,0.5)"};cursor:pointer;text-align:center;min-height:64px;">\n        <div style="font-size:11px;color:${sel?"rgba(201,168,76,0.7)":"rgba(255,255,255,0.3)"};margin-bottom:2px;">${fd.day}'</div>\n        <div style="font-size:17.6px;font-weight:${isToday?"600":"400"};">${fd.date}</div>\n        ${appts.length>0?'<div style="width:6px;height:6px;background:#c9a84c;border-radius:50%;margin:3px auto 0;"></div>':'<div style="height:9px;"></div>'}\n      </button>`}).join("")}\n  </div>\n  ${state.selectedDate?renderOwnerDaySlots(state.selectedDate):'<div style="text-align:center;color:rgba(255,255,255,0.2);padding:3rem;font-size:15.4px;">בחר יום לצפייה בתורים</div>'}`}function renderOwnerDaySlots(dateStr){const slots=generateSlots(),fd=formatDisplayDate(new Date(dateStr+"T12:00:00"));return`\n  <div>\n    <div style="font-size:14.3px;color:rgba(255,255,255,0.45);margin-bottom:12px;text-align:center;">יום ${fd.day}', ${fd.date} ${fd.month}</div>\n    ${slots.map(time=>{const appt=isSlotBooked(dateStr,time),past=isPastSlot(dateStr,time),svc=appt?SERVICES.find(s=>s.id===appt.service):null;return`<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;margin-bottom:6px;border-radius:12px;background:${appt?"rgba(201,168,76,0.08)":"rgba(255,255,255,0.03)"};border:0.5px solid ${appt?"rgba(201,168,76,0.25)":"rgba(255,255,255,0.05)"};">\n        <span style="font-size:15.4px;font-weight:500;color:${appt?"#ccc":"rgba(255,255,255,0.3)"};min-width:44px;">${time}</span>\n        ${appt?`\n          <div style="flex:1;">\n            <div style="font-size:15.4px;color:#fff;font-weight:500;">${appt.customer_name}</div>\n            <div style="font-size:13.2px;color:rgba(255,255,255,0.4);margin-top:1px;">${phoneLink(appt.customer_phone)}</div>\n            ${svc?`<div style="font-size:12.1px;color:rgba(201,168,76,0.7);margin-top:1px;">✂️ ${svc.name} — ₪${svc.price}</div>`:""}\n          </div>\n          <button data-action="owner-reschedule" data-id="${appt.id}" style="background:rgba(255,255,255,0.07);border:0.5px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.7);padding:5px 10px;border-radius:8px;font-size:12.1px;cursor:pointer;pointer-events:all;">שנה</button>\n          <button data-action="owner-cancel" data-id="${appt.id}" style="background:rgba(220,50,50,0.12);border:0.5px solid rgba(220,50,50,0.3);color:#ff8080;padding:5px 10px;border-radius:8px;font-size:12.1px;cursor:pointer;pointer-events:all;">בטל</button>\n        `:`<span style="font-size:14.3px;color:rgba(255,255,255,0.18);">${past?"עבר":"פנוי"}</span>`}\n      </div>`}).join("")}\n  </div>`}function renderOwnerAvailability(){const today=formatDate(new Date),{year:year,month:month,daysInMonth:daysInMonth,monthName:monthName}=getMonthDates(state.availMonthOffset),firstDay=new Date(year,month,1).getDay();let cells=[];for(let i=0;i<firstDay;i++)cells.push(null);for(let d=1;d<=daysInMonth;d++)cells.push(d);for(;cells.length%7!=0;)cells.push(null);const selDate=state.availSelectedDate,slots=generateSlots();return`\n  <div>\n    <div style="font-size:12.1px;color:rgba(255,255,255,0.4);margin-bottom:12px;line-height:1.5;">בחר יום ואחר-כך סמן אילו שעות יהיו <span style="color:#4caf50;">פתוחות</span> לקביעת תור. שעות לא מסומנות יופיעו ללקוחות כ<span style="color:rgba(255,255,255,0.3);">לא זמינות</span>.</div>\n\n    <div style="background:rgba(255,255,255,0.04);border-radius:14px;border:0.5px solid rgba(255,255,255,0.08);padding:12px;margin-bottom:12px;">\n      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">\n
